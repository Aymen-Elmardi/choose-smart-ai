<svg xmlns="http://www.w3.org/2000/svg" width="480" height="120" viewBox="0 0 480 120">
  <title>ChosePayments logo</title>

  <!-- Icon: dark rounded square -->
  <rect x="0" y="10" width="100" height="100" rx="20" fill="#0C141D"/>

  <!-- Faded converging paths -->
  <line x1="14" y1="34" x2="66" y2="60" stroke="#1C3A28" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="14" y1="86" x2="66" y2="60" stroke="#1C3A28" stroke-width="3.5" stroke-linecap="round"/>

  <!-- The chosen route (green) -->
  <line x1="14" y1="60" x2="78" y2="60" stroke="#11AC64" stroke-width="6" stroke-linecap="round"/>

  <!-- Arrowhead -->
  <path d="M70 50 L84 60 L70 70" fill="none" stroke="#11AC64" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="118" y="68" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#0C141D">chose</text>
  <text x="121" y="94" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#67737E" letter-spacing="5">payments</text>
</svg>
