<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <title>ChosePayments icon</title>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="114" fill="#0C141D"/>

  <!-- Faded converging paths -->
  <line x1="72" y1="154" x2="296" y2="256" stroke="#1C3A28" stroke-width="18" stroke-linecap="round"/>
  <line x1="72" y1="358" x2="296" y2="256" stroke="#1C3A28" stroke-width="18" stroke-linecap="round"/>

