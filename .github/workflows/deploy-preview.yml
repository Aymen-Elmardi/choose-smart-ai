# Deploy PR Preview to Cloudflare Workers
# Each PR gets a unique preview worker for review before merging.
name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    name: Build → Deploy Preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx vite build

      - name: Generate preview wrangler config
        run: |
          cat > wrangler.preview.jsonc << EOF
          {
            "name": "chosepayments-preview-pr${{ github.event.pull_request.number }}",
            "compatibility_date": "2026-04-04",
            "assets": {
              "directory": "./dist"
            }
          }
          EOF

      - name: Deploy to Cloudflare Workers Preview
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 97936c3b95b5e68ff3a8c2f8994ae178
          command: deploy --config wrangler.preview.jsonc

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://chosepayments-preview-pr${prNumber}.workers.dev`;
            const body = `### Preview Deployment\n\nThis PR has been deployed to a preview environment.\n\n**Preview URL:** ${previewUrl}\n\n_Updated on ${new Date().toISOString()}_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('### Preview Deployment')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
