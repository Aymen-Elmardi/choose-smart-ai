# Deploy to Cloudflare Workers (Staging)
# Triggers on every push to staging — runs lint, typecheck, build, then deploys.
name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  deploy-staging:
    name: Lint → Build → Deploy Staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build (staging mode)
        run: npx vite build --mode staging

      - name: Deploy to Cloudflare (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 97936c3b95b5e68ff3a8c2f8994ae178
          command: deploy --env staging
          wranglerVersion: "3.114.3"
