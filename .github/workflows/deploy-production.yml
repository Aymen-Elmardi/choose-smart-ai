# Deploy to Cloudflare Workers (Production)
# Triggers on every push to main — the stable production branch.
name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    name: Build → Deploy Production
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max_old_space_size=4096
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production mode)
        env:
          # Re-use existing secrets — mapped to NEXT_PUBLIC_* for Next.js
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 97936c3b95b5e68ff3a8c2f8994ae178
          wranglerVersion: "4.81.1"
          command: deploy --config wrangler.jsonc
